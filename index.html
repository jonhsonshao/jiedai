<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS-CK 质押借贷平台</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
*{margin: 0;padding: 0;box-sizing: border-box;font-family: system-ui;}
body{background: #0f172a;color: #f1f5f9;padding: 24px;}
.container{max-width: 620px;margin: 0 auto;}
.wallet-bar{background: #1e293b;padding: 14px 18px;border-radius: 12px;margin-bottom: 16px;border: 1px solid #334155;}
.wallet-bar p{font-size: 14px;color:#94a3b8;}
.box{background: #1e293b;border: 1px solid #334155;border-radius: 12px;padding: 20px;margin-bottom: 16px;}
.box h4{color:#ffffff;margin-bottom:12px;font-size:16px;}
.tip-text{font-size:13px;color:#67e8f9;margin-bottom:10px;}
input{width:100%;background:#0f172a;border:1px solid #475569;color:#fff;padding:12px 14px;border-radius:8px;margin-bottom:12px;font-size:15px;}
button{width:100%;padding:12px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-size:15px;font-weight:500;cursor:pointer;transition:0.2s;}
button:hover{background:#3b82f6;}
.order-item{font-size:13px;color:#cbd5e1;padding:6px 0;border-bottom:1px solid #334155;}
</style>
</head>
<body>
<div class="container">
    <div class="wallet-bar">
        <p>钱包地址：<span id="walletAddr">正在连接...</span></p>
    </div>

    <div class="box">
        <h4>质押 CS 代币</h4>
        <div class="tip-text">
            账户余额：<span id="csBalance">0</span> &nbsp;｜&nbsp; 最大可质押：<span id="maxPledge">0</span>
        </div>
        <input type="number" id="pledgeInput" placeholder="输入质押数量">
        <button id="pledgeBtn">确认质押</button>
    </div>

    <div class="box">
        <h4>借贷 CK 代币</h4>
        <input type="number" id="orderIdInput" placeholder="订单ID（质押完成自动填充）">
        <div class="tip-text">
            最大可借额度（已自动取整整数）：<span id="borrowTip">0</span>
        </div>
        <input type="number" id="borrowInput" placeholder="可借贷数量">
        <button id="borrowBtn">确认借贷</button>
    </div>

    <div class="box">
        <h4>全额还清债务</h4>
        <input type="number" id="repayOrderId" placeholder="输入订单ID">
        <button id="repayBtn">一键还款</button>
    </div>

    <div class="box">
        <h4>赎回质押资产</h4>
        <input type="number" id="redeemOrderId" placeholder="输入订单ID">
        <button id="redeemBtn">赎回CS</button>
    </div>

    <div class="box">
        <h4>我的全部订单</h4>
        <div id="orderList"></div>
    </div>
</div>

<script>
const CONTRACT_ADDRESS = "0x633B064ac6051E22094cBa8f3425cbaacaB0Ae14";
const CS = "0x858427abE7e4fa912D26E1e2E8851D5260F0d36e";
const CK = "0x8a1E70cd348e6c60Ba5F2096e5c89249Ad62231b";

const ERC20ABI = [
    "function approve(address spender,uint256 amount) returns(bool)",
    "function balanceOf(address) view returns(uint256)",
    "function allowance(address owner,address spender) view returns(uint256)"
];

const MainABI = [
    "function createPledge(uint256 csAmount) external",
    "function borrowSingle(uint256 orderId,uint256 borrowAmount) external",
    "function repayLoan(uint256 orderId) external",
    "function redeemPledge(uint256 orderId) external",
    "function getSpotValue(uint256 csAmount) view returns(uint256)",
    "function getUserOrders(address user,uint256 page,uint256 size) view returns(uint256[])",
    "function getOrderInfo(uint256 orderId) view returns(address,uint256,uint256,uint8)"
];

let provider, signer, contract, csContract;

async function init() {
    if (!window.ethereum) {
        alert("未检测到钱包插件");
        return;
    }
    provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    const addr = await signer.getAddress();
    document.getElementById("walletAddr").innerText = addr;

    contract = new ethers.Contract(CONTRACT_ADDRESS, MainABI, signer);
    csContract = new ethers.Contract(CS, ERC20ABI, signer);

    await refreshBalance();
    await loadOrders();
}

async function refreshBalance() {
    const bn = await csContract.balanceOf(await signer.getAddress());
    const balanceStr = ethers.utils.formatEther(bn);
    document.getElementById("csBalance").innerText = balanceStr;
    document.getElementById("maxPledge").innerText = balanceStr;
}

// 质押成功后自动刷新订单列表
document.getElementById("pledgeBtn").onclick = async ()=>{
    const amountStr = document.getElementById("pledgeInput").value;
    const amountWei = ethers.utils.parseEther(amountStr);
    const owner = await signer.getAddress();
    const allowanceWei = await csContract.allowance(owner, CONTRACT_ADDRESS);

    if (allowanceWei.lt(amountWei)) {
        await csContract.approve(CONTRACT_ADDRESS, ethers.constants.MaxUint256);
    }
    await contract.createPledge(amountWei);
    refreshBalance();
    // 质押完成立刻刷新订单列表
    await loadOrders();
};

document.getElementById("pledgeInput").oninput = async ()=>{
    try{
        const valWei = ethers.utils.parseEther(document.getElementById("pledgeInput").value);
        const value = await contract.getSpotValue(valWei);
        let borrowWei = value.mul(60).div(100);
        let num = Math.floor(Number(ethers.utils.formatEther(borrowWei)));
        document.getElementById("borrowTip").innerText = num;
        document.getElementById("borrowInput").value = num;
    }catch(e){}
};

document.getElementById("borrowBtn").onclick = async ()=>{
    const oid = document.getElementById("orderIdInput").value;
    const numWei = ethers.utils.parseEther(document.getElementById("borrowInput").value);
    await contract.borrowSingle(oid, numWei);
    loadOrders();
};

document.getElementById("repayBtn").onclick = async ()=>{
    const oid = document.getElementById("repayOrderId").value;
    await contract.repayLoan(oid);
    loadOrders();
};

document.getElementById("redeemBtn").onclick = async ()=>{
    const oid = document.getElementById("redeemOrderId").value;
    await contract.redeemPledge(oid);
    refreshBalance();
    loadOrders();
};

// 加载订单，自动把最新订单填充到借贷输入框
async function loadOrders(){
    const user = await signer.getAddress();
    const ids = await contract.getUserOrders(user,0,30);
    const statusArr = ["质押中","已放款","已结清","已清算","已赎回"];
    let html = "";
    // 最新订单放在最上面
    ids.reverse();
    for(let id of ids){
        let info = await contract.getOrderInfo(id);
        html += `<div class="order-item">订单${id} | CS:${ethers.utils.formatEther(info[1])} | CK:${ethers.utils.formatEther(info[2])} | ${statusArr[info[3]]}</div>`;
    }
    document.getElementById("orderList").innerHTML = html;

    // 自动填充最新订单ID到借贷框
    if(ids.length > 0){
        document.getElementById("orderIdInput").value = ids[0];
    }
}

window.onload = init;
</script>
</div>
</body>
</html>
