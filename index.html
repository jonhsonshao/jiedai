<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS质押借贷</title>
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f7fa;padding:16px;}
.wrap{max-width:550px;margin:0 auto;background:#fff;padding:20px;border-radius:14px;}
h2{text-align:center;margin-bottom:16px;}
.status{padding:10px;background:#e8f3ff;border-radius:8px;margin-bottom:16px;word-break:break-all;}
.box{border:1px solid #eee;border-radius:10px;padding:15px;margin-bottom:15px;}
.tip{color:#0052cc;margin:5px 0;}
input{width:100%;padding:11px;border:1px solid #ddd;border-radius:7px;margin:7px 0;font-size:16px;}
button{width:100%;padding:12px;border:0;border-radius:7px;font-size:16px;margin-top:5px;cursor:pointer;}
button:disabled{background:#cccccc !important;color:#888;pointer-events:none;}
.btn-blue{background:#1677ff;color:#fff;}
.btn-orange{background:#ff7800;color:#fff;}
.btn-green{background:#009688;color:#fff;}
.btn-gray{background:#666;color:#fff;}
.order-box{max-height:220px;overflow:auto;border:1px solid #ddd;padding:8px;border-radius:8px;}
.order-item{padding:9px;border-bottom:1px solid #eee;font-size:14px;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
<h2>CS质押借贷系统</h2>
<div class="status" id="statusText">正在连接TP钱包...</div>

<div class="box">
    <div class="tip">最大可质押CS：<span id="csBalance">0</span></div>
    <input type="text" id="pledgeNum" placeholder="输入质押CS数量">
    <button class="btn-blue" onclick="pledge()">质押CS（自动授权）</button>
</div>

<div class="box">
    <div class="tip">最大可借BSDT：<span id="borrowLimit">0</span></div>
    <button class="btn-orange" id="borrowBtn" disabled>申请借款</button>
</div>

<div class="box">
    <h4>我的订单（点击选中）</h4>
    <div class="order-box" id="orderList"></div>
    <button class="btn-gray" onclick="loadOrders()">刷新订单</button>
</div>

<div class="box">
    <input readonly id="orderId">
    <div class="tip">待还本息：<span id="debtText">0</span></div>
    <button class="btn-orange" id="repayBtn" disabled>归还BSDT</button>
</div>

<div class="box">
    <button class="btn-green" id="redeemBtn" disabled>赎回CS资产</button>
</div>
</div>

<script>
const CS = "0x858427abE7e4fa912D26E1e2E8851D5260F0d36e";
const BSDT = "0x177401f63A997f65137c52e1178863284f455091";
const CONTRACT = "0x180713a5e1021dab077f765cbc88a2d5843388f1";

const ABI_CONTRACT = [
{"inputs":[{"internalType":"uint256","name":"csAmount","type":"uint256"}],"name":"pledgeAsset","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[{"internalType":"uint256","name":"orderId","type":"uint256"}],"name":"borrowFund","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[{"internalType":"uint256","name":"orderId","type":"uint256"}],"name":"repayLoan","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[{"internalType":"uint256","name":"orderId","type":"uint256"}],"name":"redeemAsset","outputs":[],"stateMutability":"nonpayable","type":"function"},
{"inputs":[{"internalType":"uint256","name":"csAmount","type":"uint256"}],"name":"getPledgeValue","outputs":[{"internalType":"uint256","name":"usdtValue","type":"uint256"}],"stateMutability":"view","type":"function"},
{"inputs":[{"internalType":"uint256","name":"orderId","type":"uint256"}],"name":"calculateInterest","outputs":[{"internalType":"uint256","name":"totalInterest","type":"uint256"}],"stateMutability":"view","type":"function"},
{"inputs":[{"internalType":"uint256","name":"orderId","type":"uint256"}],"name":"getOrderInfo","outputs":[{"internalType":"address","name":"user","type":"address"},{"internalType":"uint256","name":"lockedCS","type":"uint256"},{"internalType":"uint256","name":"loanBSDT","type":"uint256"},{"internalType":"uint256","name":"startTime","type":"uint256"},{"internalType":"uint8","name":"status","type":"uint8"}],"stateMutability":"view","type":"function"},
{"inputs":[],"name":"orderTotal","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"}
];

const ABI_ERC20 = [
{"constant":false,"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"},
{"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"","type":"uint256"}],"type":"function"}
];

let web3;
let account = "";
let contractInstance;
let csToken;
let selectedOid = null;

async function init(){
    if(!window.ethereum){
        document.getElementById("statusText").innerText = "请在TP钱包内置浏览器打开";
        return;
    }
    web3 = new Web3(window.ethereum);
    await window.ethereum.request({method:"eth_requestAccounts"});
    const accounts = await web3.eth.getAccounts();
    account = accounts[0].toLowerCase();
    document.getElementById("statusText").innerText = "已连接钱包："+account;

    contractInstance = new web3.eth.Contract(ABI_CONTRACT, CONTRACT);
    csToken = new web3.eth.Contract(ABI_ERC20, CS);

    await loadBalance();
    await loadOrders();
}

async function loadBalance(){
    const raw = await csToken.methods.balanceOf(account).call();
    const bal = web3.utils.fromWei(raw.toString(), "ether");
    document.getElementById("csBalance").innerText = bal;
}

async function pledge(){
    const num = document.getElementById("pledgeNum").value.trim();
    if(!num){alert("请输入质押数量");return;}
    const wei = web3.utils.toWei(num,"ether");
    await csToken.methods.approve(CONTRACT, wei).send({from:account});
    await contractInstance.methods.pledgeAsset(wei).send({from:account});
    alert("质押成功");
    loadBalance();
    loadOrders();
}

async function borrow(){
    await contractInstance.methods.borrowFund(selectedOid).send({from:account});
    alert("借款成功");
    loadOrders();
}

async function repay(){
    const bsdt = new web3.eth.Contract(ABI_ERC20,BSDT);
    await bsdt.methods.approve(CONTRACT, web3.utils.toWei("999999999","ether")).send({from:account});
    await contractInstance.methods.repayLoan(selectedOid).send({from:account});
    alert("还款完成");
    loadOrders();
}

async function redeem(){
    await contractInstance.methods.redeemAsset(selectedOid).send({from:account});
    alert("赎回成功");
    loadBalance();
    loadOrders();
}

async function loadOrders(){
    resetBtn();
    const total = await contractInstance.methods.orderTotal().call();
    let html = "";
    for(let i=0;i<Number(total);i++){
        const o = await contractInstance.methods.getOrderInfo(i).call();
        if(o.user.toLowerCase() !== account) continue;
        html += `<div class="order-item" onclick="pickOrder(${i})">ID:${i} | CS:${web3.utils.fromWei(o.lockedCS.toString(),"ether")}</div>`;
    }
    document.getElementById("orderList").innerHTML = html;
}

// 选中订单（核心修复：强制把status转为数字Number）
async function pickOrder(id){
    selectedOid = id;
    document.getElementById("orderId").value = id;
    const o = await contractInstance.methods.getOrderInfo(id).call();
    // 强制转数字，杜绝字符串对比失败
    const status = Number(o.status);

    // 计算借款额度
    if(status === 0){
        const val = await contractInstance.methods.getPledgeValue(o.lockedCS).call();
        const maxLoan = BigInt(val.toString()) * 60n / 100n;
        document.getElementById("borrowLimit").innerText = web3.utils.fromWei(maxLoan.toString(),"ether");
    }else{
        document.getElementById("borrowLimit").innerText = "不可借款";
    }

    // 计算欠款
    if(status === 1){
        const interest = await contractInstance.methods.calculateInterest(id).call();
        const total = BigInt(o.loanBSDT.toString()) + BigInt(interest.toString());
        document.getElementById("debtText").innerText = web3.utils.fromWei(total.toString(),"ether");
    }else{
        document.getElementById("debtText").innerText = "无欠款";
    }

    // 控制按钮
    setBtn(status);
}

function setBtn(statusNum){
    const btnBorrow = document.getElementById("borrowBtn");
    const btnRepay = document.getElementById("repayBtn");
    const btnRedeem = document.getElementById("redeemBtn");

    btnBorrow.disabled = true;
    btnRepay.disabled = true;
    btnRedeem.disabled = true;

    if(statusNum === 0){
        // 仅质押：借款+赎回同时开启
        btnBorrow.disabled = false;
        btnRedeem.disabled = false;
    }
    if(statusNum === 1){
        // 已借款：只开启还款
        btnRepay.disabled = false;
    }
    if(statusNum === 2){
        // 已还清：只开启赎回
        btnRedeem.disabled = false;
    }
}

function resetBtn(){
    selectedOid = null;
    document.getElementById("orderId").value = "";
    document.getElementById("borrowLimit").innerText = "0";
    document.getElementById("debtText").innerText = "0";
    document.getElementById("borrowBtn").disabled = true;
    document.getElementById("repayBtn").disabled = true;
    document.getElementById("redeemBtn").disabled = true;
}

window.onload = init;
</script>
</body>
</html>
